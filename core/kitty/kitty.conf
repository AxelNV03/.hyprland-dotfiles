# =======================================================================
# KITTY CONFIGURATION - GENERIC OPERATIVE CORE
# =======================================================================

# --- [ FUENTES ] ---
# Define la tipografía principal del contenedor de la terminal
font_family      JetBrainsMono NF Bold

# Permite que Kitty busque automáticamente las variantes tipográficas
bold_font        auto
italic_font      auto
bold_italic_font auto

# Tamaño base de la fuente en puntos
font_size        12.0

# Oculta las ligaduras tipográficas bajo el cursor para facilitar la edición de código
disable_ligatures cursor


# --- [ RENDIMIENTO Y ENTORNO GRÁFICO ] ---
# Fuerza el uso del protocolo Wayland nativo para evitar borrosidad por escalado
linux_display_server     wayland

# Define el tipo de terminal en el entorno virtual
term                     xterm-kitty

# Retraso en milisegundos entre actualizaciones de pantalla (Equivale a ~100 FPS)
repaint_delay            10

# Retraso en milisegundos antes de procesar la entrada del teclado para mitigar parpadeos
input_delay              3

# Sincroniza los frames renderizados con la tasa de refresco nativa de tu monitor
sync_to_monitor          yes


# --- [ COMPORTAMIENTO GENERAL ] ---
# Cantidad de líneas que se guardan en la memoria RAM para el historial de scroll
scrollback_lines         5000

# Multiplicador de velocidad para el desplazamiento con la rueda del ratón
wheel_scroll_multiplier  3.0

# Oculta el cursor del ratón inmediatamente al empezar a escribir en el teclado
mouse_hide_wait          -1

# Desactiva por completo la campana o pitido de audio del sistema
enable_audio_bell        no

# Evita que Kitty pida confirmación molesta al cerrar ventanas activas
confirm_os_window_close  0


# --- [ CONTROL DE CURSOR ] ---
# Establece que el cursor tenga forma de bloque sólido
cursor_shape             block

# Desactiva el parpadeo del cursor para un entorno de texto estático y limpio
cursor_blink_interval    0


# --- [ ADMINISTRACIÓN Y DISEÑO DE VENTANAS INTERNAS ] ---
# Evita que Kitty recuerde el tamaño de su última sesión al abrirse
remember_window_size     no

# Establece el ancho inicial por defecto de la ventana en píxeles
initial_window_width     1200

# Establece el alto inicial por defecto de la ventana en píxeles
initial_window_height    750

# Elimina las decoraciones, bordes y barras de título nativas de las ventanas de Kitty
hide_window_decorations  yes

# Añade un pequeño margen de 4 píxeles entre el texto de tus programas y los bordes
window_padding_width     4

# Define los esquemas de organización interna de sub-ventanas permitidos en Kitty
enabled_layouts          tall,stack


# --- [ ATADOS DE TECLADO: MANEJO DE VENTANAS INTERNAS ] ---
# Abre una nueva división de ventana interna dentro de Kitty
map ctrl+shift+enter     new_window

# Pasa a la siguiente subdivisión de ventana activa
map ctrl+shift+]         next_window

# Regresa a la subdivisión de ventana anterior
map ctrl+shift+[         previous_window

# Cicla de forma interactiva entre los esquemas de diseño (layouts) disponibles
map ctrl+shift+l         next_layout

# Fuerza el diseño interno a pantalla dividida (Tall)
map ctrl+alt+r           goto_layout tall

# Fuerza el diseño interno a maximizado en pila (Stack / Enfoque completo)
map ctrl+alt+s           goto_layout stack


# --- [ ATADOS DE TECLADO: MANEJO DE PESTAÑAS (TABS) ] ---
# Crea una nueva pestaña interna dentro de la misma ventana de Kitty
map ctrl+shift+t         new_tab

# Salta a la pestaña que se encuentra a la derecha
map ctrl+shift+right     next_tab

# Salta a la pestaña que se encuentra a la izquierda
map ctrl+shift+left      previous_tab

# Cierra la pestaña que se está visualizando actualmente
map ctrl+shift+q         close_tab

# Resetea el tamaño de la fuente a los valores por defecto del Core (12.0)
map ctrl+shift+backspace change_font_size all 0


# --- [ DISEÑO ESTÁTICO DE LA BARRA DE PESTAÑAS ] ---
# Utiliza el estilo Powerline con separadores gráficos para las pestañas
tab_bar_style            powerline

# Establece los separadores de las pestañas en ángulo inclinado de forma angular
tab_powerline_style      slanted

# Coloca la barra de pestañas en la zona inferior de la ventana de Kitty
tab_bar_edge             bottom

# Alinea el bloque de las pestañas hacia el extremo izquierdo de la barra
tab_bar_align            left

# Aplica tipografía en negrita a la pestaña que se encuentra en primer plano
active_tab_font_style    bold

# Mantiene tipografía estándar para las pestañas que están en segundo plano
inactive_tab_font_style  normal

# --- [ COMPORTAMIENTO ] 
wheel_scroll_min_lines   1
detect_urls              yes
url_style                curly
open_url_with            default


# --- [ ENLAZADO DINÁMICO DE COLORES ] ---
# Enlace al archivo que será modificado dinámicamente por tu cerebro de color (Matugen)
include colors.conf