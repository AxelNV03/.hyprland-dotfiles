[config.wallpaper]
command = "hyprctl hyprpaper wallpaper ,{{ image }}"
set = true

[templates.hyprland]
input_path = '~/.hyprland-dotfiles/core/matugen/templates/hyprland-colors.lua'
output_path = '~/.config/hypr/modules/colors.lua'

[templates.gtk3]
input_path = '~/.hyprland-dotfiles/core/matugen/templates/gtk.css'
output_path = '~/.config/gtk-3.0/colors.css'
# post_hook = 'gsettings set org.gnome.desktop.interface gtk-theme ""; gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}'

[templates.gtk4]
input_path = '~/.hyprland-dotfiles/core/matugen/templates/gtk.css'
output_path = '~/.config/gtk-4.0/colors.css'
# post_hook = '~/.hyprland-dotfiles/core/matugen/post-hook-scripts/gtk-themes-reload.sh'

[templates.kitty]
input_path = '~/.hyprland-dotfiles/core/matugen/templates/kitty-colors.conf'
output_path = '~/.config/kitty/colors.conf'
# post_hook = "kitty +kitten themes --reload-in=all Matugen"

[templates.rofi]
input_path = '~/.hyprland-dotfiles/core/matugen/templates/rofi-colors.rasi'
output_path = '~/.config/rofi/colors.rasi'

[templates.waybar]
input_path = '~/.hyprland-dotfiles/core/matugen/templates/waybar-colors.css'
output_path = '~/.config/waybar/colors.css'
# post_hook = 'pkill -SIGUSR2 waybar'
# ...

[templates.swaync]
input_path = "~/.hyprland-dotfiles/core/matugen/templates/swaync-colors.css"
output_path = "~/.config/swaync/colors.css"
post_hook = "swaync-client -rs"